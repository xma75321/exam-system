name: 部署生产环境

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

env:
  APP_DIR: /opt/app/exam-system

jobs:
  # ============================================
  # 第一阶段：构建验证
  # ============================================
  build-verify:
    name: 构建验证
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 验证 Docker 构建
        run: |
          echo "验证 Dockerfile 语法..."
          docker compose -f docker-compose.prod.yml config --quiet
          echo "✅ Docker Compose 配置验证通过"

  # ============================================
  # 第二阶段：等待人工批准
  # ============================================
  approve:
    name: 等待人工批准
    runs-on: ubuntu-latest
    needs: build-verify
    environment:
      name: production
      url: https://yourdomain.com
    
    steps:
      - name: 批准确认
        run: echo "✅ 生产环境部署已获得批准"

  # ============================================
  # 第三阶段：数据库备份
  # ============================================
  backup:
    name: 备份数据库
    runs-on: ubuntu-latest
    needs: approve
    
    steps:
      - name: 备份数据库
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            
            echo "=========================================="
            echo "备份数据库"
            echo "=========================================="
            
            cd ${{ env.APP_DIR }}
            
            # 创建备份目录
            mkdir -p backups
            
            # 备份数据库
            BACKUP_FILE="backups/db_backup_$(date +%Y%m%d_%H%M%S).sql"
            echo "备份到: $BACKUP_FILE"
            
            docker compose exec -T db mysqldump \
              -u root \
              -p${{ secrets.MYSQL_ROOT_PASSWORD }} \
              exam_system > "$BACKUP_FILE"
            
            # 压缩备份
            gzip "$BACKUP_FILE"
            
            # 清理 30 天前的备份
            find backups -name "*.gz" -mtime +30 -delete
            
            echo "✅ 数据库备份完成"
            ls -lh backups/

  # ============================================
  # 第四阶段：部署生产环境
  # ============================================
  deploy-prod:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: backup
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            
            echo "=========================================="
            echo "开始部署生产环境"
            echo "=========================================="
            
            # 进入项目目录
            cd ${{ env.APP_DIR }}
            
            # 拉取最新代码
            echo "[1/6] 拉取最新代码..."
            git fetch origin
            git checkout main
            git pull origin main
            
            # 显示当前版本
            echo "[2/6] 当前版本: $(git log --oneline -1)"
            
            # 构建 Docker 镜像
            echo "[3/6] 构建 Docker 镜像..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            # 执行数据库迁移
            echo "[4/6] 执行数据库迁移..."
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            
            # 滚动更新服务
            echo "[5/6] 更新服务..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # 等待服务启动
            echo "等待服务启动..."
            sleep 20
            
            # 验证服务状态
            echo "[6/6] 验证服务状态..."
            echo "=========================================="
            echo "服务状态:"
            docker compose -f docker-compose.prod.yml ps
            
            # 健康检查
            echo ""
            echo "健康检查:"
            curl -sf http://localhost:8000/health && echo " [OK] Backend" || echo " [FAIL] Backend"
            curl -sf http://localhost:3000 && echo " [OK] Frontend" || echo " [FAIL] Frontend"
            
            # 清理旧镜像
            echo ""
            echo "清理旧镜像..."
            docker image prune -f
            
            echo "=========================================="
            echo "生产环境部署完成!"
            echo "=========================================="

  # ============================================
  # 第五阶段：部署验证
  # ============================================
  verify:
    name: 部署验证
    runs-on: ubuntu-latest
    needs: deploy-prod
    
    steps:
      - name: 验证服务
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "最终验证..."
            
            # 检查容器状态
            cd ${{ env.APP_DIR }}
            
            # 检查所有容器是否运行
            RUNNING=$(docker compose -f docker-compose.prod.yml ps --services --filter "status=running" | wc -l)
            TOTAL=$(docker compose -f docker-compose.prod.yml ps --services | wc -l)
            
            echo "运行中的容器: $RUNNING / $TOTAL"
            
            if [ "$RUNNING" -eq "$TOTAL" ]; then
              echo "✅ 所有容器运行正常"
            else
              echo "❌ 部分容器未正常运行"
              docker compose -f docker-compose.prod.yml ps
              exit 1
            fi

      - name: 部署结果通知
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ 生产环境部署成功"
            echo "=========================================="
            echo "部署摘要:"
            echo "- 版本: ${{ github.sha }}"
            echo "- 时间: $(date)"
            echo "- 状态: 成功"
            echo "=========================================="
          else
            echo "❌ 生产环境部署失败"
            echo "请检查日志并执行回滚操作"
          fi
