name: CI - 持续集成

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # 后端测试
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: exam_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 配置环境变量
        working-directory: ./backend
        run: |
          echo "DATABASE_URL=mysql+pymysql://root:test_password@localhost:3306/exam_system_test" > .env
          echo "SECRET_KEY=test_secret_key_for_ci" >> .env

      - name: 执行数据库迁移
        working-directory: ./backend
        run: alembic upgrade head

      - name: 运行后端测试
        working-directory: ./backend
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: mysql+pymysql://root:test_password@localhost:3306/exam_system_test

  # 前端测试
  frontend-test:
    name: 前端测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./frontend
        run: npm run type-check

      - name: ESLint 代码检查
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: 构建检查
        working-directory: ./frontend
        run: npm run build

  # Docker 构建测试
  docker-build:
    name: Docker 构建测试
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建后端镜像
        run: docker build -t exam-backend-test -f docker/Dockerfile.backend ./backend

      - name: 构建前端镜像
        run: docker build -t exam-frontend-test -f docker/Dockerfile.frontend ./frontend

  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查后端代码质量
        working-directory: ./backend
        run: |
          pip install ruff
          ruff check app/ --select=E,F,I --statistics

      - name: 检查前端代码质量
        working-directory: ./frontend
        run: |
          npm ci
          npm run lint
